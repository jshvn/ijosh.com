# Site settings
baseURL = "https://ijosh.com/"
locale = "en-US"
title = "Josh Vaughen"
disableKinds = ["section", "taxonomy", "RSS"]
enableGitInfo = true

# Copyright
copyright = "&copy;2024 Josh Vaughen"

[sitemap]
  changeFreq = 'monthly'
  disable = false
  filename = 'sitemap.xml'
  priority = 0.8

[params]

  # Metadata for search engines and social sharing
  author = "Josh Vaughen"
  firstName = "Josh"
  description = "Josh Vaughen is a machine learning engineer in Seattle who builds AI-integrated training systems, lifts heavy, and has solo-traveled 60+ countries."
  shareImage = "images/profile.webp"
  twitterHandle = "dvnll"

  # Favicon
  favicon = "images/favicon.png"

  # Cloudflare Web Analytics beacon token (public; omit to disable the beacon)
  cloudflareBeaconToken = "8ec666be52124450bc6694216a8ef6ba"

  # Social Links
  [params.social]
    email = "josh@vaughen.net"
    instagram = "https://instagram.com/joshthings"
    linkedin = "https://linkedin.com/in/ijosh"
    github = "https://github.com/jshvn"
    twitter = "https://x.com/dvnll"

  [params.custom.css]
    enable = true
  
  [params.showemail]
    enable = true

  [params.showgithub]
    enable = true

  [params.showtwitter]
    enable = false

  [params.showlocation]
    enable = true

  [params.showemojis]
    enable = true

  # Section - Visual
  [params.visual]

    # Image
    [params.visual.image]
      enable = true
      file = "images/profile.webp"
      position = "center center"

    # Video (alternative to image; keep disabled while the image is used)
    [params.visual.video]
      enable = false

